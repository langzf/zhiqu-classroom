# zhiqu-classroom 完整部署
# 基础设施 + 应用服务

services:
  # ── 基础设施 ──────────────────────────────────────

  postgres:
    image: pgvector/pgvector:pg16
    container_name: zhiqu-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: zhiqu
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: zhiqu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: zhiqu-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9002:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── 应用服务 ──────────────────────────────────────

  backend:
    build:
      context: ./services
      dockerfile: Dockerfile
    container_name: zhiqu-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./deploy/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    container_name: zhiqu-app
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

  admin:
    build:
      context: .
      dockerfile: Dockerfile.admin
    container_name: zhiqu-admin
    restart: unless-stopped
    ports:
      - "3001:80"
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  miniodata:
